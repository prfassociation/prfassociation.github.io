<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pickering and Rangel Fellows Association (PRFA)</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      background: #111;
      overflow: auto;
      font-family: system-ui, sans-serif;
    }

    img {
      display: block;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 32px);
      object-fit: contain;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body>
  <a href="https://www.zeffy.com/en-US/ticketing/annual-prfa-gala"><img src="Gala.jpeg" alt="2026 PRFA Gala" /></a>
</body>
</html>
